<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Coctelería Experimental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #15100c; }
    #root { position: fixed; inset: 0; }

    #skip-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 9px 22px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 12px;
      color: rgba(224,181,61,0.7);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: rgba(21,16,12,0.72);
      border: 1px solid rgba(224,181,61,0.26);
      border-radius: 4px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 200ms, border-color 200ms;
      z-index: 10;
    }
    #skip-btn:hover { color: rgba(224,181,61,1); border-color: rgba(224,181,61,0.55); }

    #splash-root {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #15100c;
      transition: opacity 0.7s ease;
    }
    #splash-root.fading { opacity: 0; pointer-events: none; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, createContext, useContext } = React;

    /* ── Easing ──────────────────────────────────────────────────────────── */
    const Easing = {
      linear:         t => t,
      easeInQuad:     t => t * t,
      easeOutQuad:    t => t * (2 - t),
      easeInCubic:    t => t * t * t,
      easeOutCubic:   t => (--t) * t * t + 1,
      easeInOutCubic: t => t < 0.5 ? 4*t*t*t : (t-1)*(2*t-2)*(2*t-2)+1,
      easeInExpo:     t => t === 0 ? 0 : Math.pow(2, 10*(t-1)),
      easeOutExpo:    t => t === 1 ? 1 : 1 - Math.pow(2, -10*t),
      easeOutBack: t => {
        const c1 = 1.70158, c3 = c1 + 1;
        return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
      },
      easeInBack: t => {
        const c1 = 1.70158, c3 = c1 + 1;
        return c3*t*t*t - c1*t*t;
      },
      easeOutElastic: t => {
        const c4 = (2*Math.PI)/3;
        if (t === 0) return 0;
        if (t === 1) return 1;
        return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
      },
    };

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    /* ── Timeline context ────────────────────────────────────────────────── */
    const TimelineContext = createContext({ time: 0, duration: 14, playing: true });
    const useTime     = () => useContext(TimelineContext).time;
    const useTimeline = () => useContext(TimelineContext);

    /* ── Sprite ──────────────────────────────────────────────────────────── */
    const SpriteContext = createContext({ localTime: 0, progress: 0, duration: 0, visible: true });
    const useSprite = () => useContext(SpriteContext);

    function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
      const { time } = useTimeline();
      const visible = time >= start && time <= end;
      if (!visible && !keepMounted) return null;
      const dur      = end - start;
      const localTime = Math.max(0, time - start);
      const progress  = dur > 0 && isFinite(dur) ? clamp(localTime / dur, 0, 1) : 0;
      const value = { localTime, progress, duration: dur, visible };
      return (
        <SpriteContext.Provider value={value}>
          {typeof children === 'function' ? children(value) : children}
        </SpriteContext.Provider>
      );
    }

    /* ── Brand palette & constants ───────────────────────────────────────── */
    const C = {
      bg:     '#15100c',
      gold:   '#e0b53d',
      goldHi: '#f4dd97',
      cream:  '#f1e6cf',
      red:    '#b2202a',
      dim:    'rgba(224,181,61,0.34)',
    };
    const FONT_DECO  = "'Cinzel', serif";
    const FONT_SERIF = "'Cormorant Garamond', serif";
    const FONT_MONO  = "'JetBrains Mono', ui-monospace, monospace";
    const LOGO_SRC   = 'uploads/logo-crest.png';
    const W = 1080, H = 1920, DURATION = 14;

    /* ── Google Drive cocktail photos ────────────────────────────────────── */
    const PHOTOS = [
      { id: '1K8Hbuj0SmVmo1XIF6MjZQX5dOJgTmE2k', title: 'Basil Smash' },
      { id: '1tBzIZZG0w2cDrBo3xC8G2TqPjU67aijl', title: 'Lemon Basil Spritz' },
      { id: '1sbCNZS8KUoySffduCqgizjr9_1TQrCeu', title: 'Mojito' },
      { id: '1SEjzTyRXJI1NIdY7-P4AmYZMNWaSJ26x', title: 'La Rosita' },
      { id: '18-Qzt004AXRrYn-QmoGN3EOs2LTf2CqU', title: 'La Dama' },
      { id: '1YTTBQaJkRY_fAJ5zFUuub6ihxuKBUg2P', title: 'Basil & Pear Smash' },
      { id: '1T5pcInjKXg9rad0tOB_vvDVU4LfAcffd', title: 'Flor de Fuego' },
      { id: '108TB2hBUXsxg_eRCa8d6Ex3-82y8hCHX', title: 'La Rosita' },
    ];
    const driveUrl = id => `https://drive.google.com/thumbnail?id=${id}&sz=w1600`;
    function pickTwo() {
      const a = [...PHOTOS];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return [a[0], a[1]];
    }

    /* ── Background: security-paper guilloché ────────────────────────────── */
    function Background() {
      const t     = useTime();
      const drift = Math.sin(t * 0.18) * 10;
      const rot   = t * 1.4;
      return (
        <div style={{ position:'absolute', inset:0, background:C.bg, overflow:'hidden' }}>
          <div style={{ position:'absolute', inset:0,
            background:'radial-gradient(120% 90% at 50% 40%, rgba(140,42,34,0.32) 0%, rgba(21,16,12,0) 56%)' }} />
          <div style={{ position:'absolute', left:'50%', top:'42%',
            width:2200, height:2200, marginLeft:-1100, marginTop:-1100,
            transform:`translateY(${drift}px) rotate(${rot}deg)`,
            background:'repeating-radial-gradient(circle, rgba(224,181,61,0.05) 0 1px, rgba(224,181,61,0) 1px 14px)',
            opacity:0.9 }} />
          <div style={{ position:'absolute', inset:-40,
            transform:`translateY(${-drift}px)`,
            background:'repeating-linear-gradient(60deg, rgba(224,181,61,0.04) 0 1px, rgba(224,181,61,0) 1px 9px)' }} />
          <div style={{ position:'absolute', inset:0,
            background:'linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 22%, rgba(0,0,0,0.30) 100%)' }} />
        </div>
      );
    }

    /* ── Art-deco frame that draws itself in ──────────────────────────────── */
    function DecoFrame() {
      const { localTime } = useSprite();
      const draw   = Easing.easeOutCubic(clamp(localTime / 1.2, 0, 1));
      const corner = Easing.easeOutBack(clamp((localTime - 0.5) / 0.8, 0, 1));
      const M = 70;
      const side = extra => ({ position:'absolute', background:C.gold, opacity:0.85, ...extra });
      const cLen  = 64 * corner;
      return (
        <div style={{ position:'absolute', inset:0 }}>
          <div style={side({ left:M, right:M, top:M,    height:1.5, transform:`scaleX(${draw})` })} />
          <div style={side({ left:M, right:M, bottom:M, height:1.5, transform:`scaleX(${draw})` })} />
          <div style={side({ top:M, bottom:M, left:M,   width:1.5,  transform:`scaleY(${draw})` })} />
          <div style={side({ top:M, bottom:M, right:M,  width:1.5,  transform:`scaleY(${draw})` })} />
          <div style={{ position:'absolute', left:M+12, right:M+12, top:M+12, bottom:M+12,
            border:`1px solid ${C.dim}`, opacity:draw }} />
          {[['top','left'],['top','right'],['bottom','left'],['bottom','right']].map(([v,h],i) => (
            <React.Fragment key={i}>
              <div style={{ position:'absolute', [v]:M-6, [h]:M-6, width:cLen, height:3, background:C.goldHi }} />
              <div style={{ position:'absolute', [v]:M-6, [h]:M-6, width:3, height:cLen, background:C.goldHi }} />
              <div style={{ position:'absolute', [v]:M+8, [h]:M+8, width:7, height:7, background:C.gold,
                transform:'rotate(45deg)', opacity:corner }} />
            </React.Fragment>
          ))}
        </div>
      );
    }

    /* ── Monospace line that types itself in ──────────────────────────────── */
    function MonoLine({ text, x, y, size=22, color=C.gold, align='left', letter='0.34em', delay=0 }) {
      const { localTime } = useSprite();
      const lt  = localTime - delay;
      const n   = clamp(Math.floor((lt / 0.9) * text.length), 0, text.length);
      const shown = lt < 0 ? '' : text.slice(0, n);
      const caret = (lt >= 0 && n < text.length) ? '▍' : '';
      const tx  = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';
      return (
        <div style={{ position:'absolute', left:x, top:y,
          transform:`translateX(${tx})`,
          fontFamily:FONT_MONO, fontSize:size, color,
          letterSpacing:letter, whiteSpace:'pre', textTransform:'uppercase',
          opacity: lt < 0 ? 0 : 1 }}>
          {shown}<span style={{ opacity:0.6 }}>{caret}</span>
        </div>
      );
    }

    /* ── Photo reveal: clip-wipe + ken-burns ─────────────────────────────── */
    function PhotoReveal({ src, caption, code, fromLeft=true }) {
      const { localTime, duration } = useSprite();
      const inT      = Easing.easeOutCubic(clamp(localTime / 0.7, 0, 1));
      const exitStart = duration - 0.55;
      const outT     = localTime > exitStart
        ? Easing.easeInCubic(clamp((localTime - exitStart) / 0.55, 0, 1)) : 0;
      const opacity  = inT * (1 - outT);
      const span     = Math.max(0.001, duration - 1.2);
      const kb       = clamp((localTime - 0.7) / span, 0, 1);
      const scale    = 1.06 + 0.1 * kb;
      const wipe     = (1 - inT) * 100;
      const clip     = fromLeft ? `inset(0 ${wipe}% 0 0)` : `inset(0 0 0 ${wipe}%)`;
      const FW = 760, FH = 980;
      return (
        <div style={{ position:'absolute', left:(W-FW)/2, top:360, width:FW, height:FH,
          opacity, transform:`translateY(${(1-inT)*14}px)` }}>
          <div style={{ position:'absolute', inset:-10,
            border:`1px solid ${C.gold}`, opacity:0.55 }} />
          <div style={{ position:'absolute', inset:0, overflow:'hidden',
            clipPath:clip, background:'#1c140e' }}>
            <img src={src} alt={caption} style={{
              position:'absolute', inset:0, width:'100%', height:'100%',
              objectFit:'cover', transform:`scale(${scale})`,
              transformOrigin:'50% 45%', display:'block' }} />
            <div style={{ position:'absolute', inset:0,
              background:'linear-gradient(180deg, rgba(21,16,12,0.05) 40%, rgba(21,16,12,0.72) 100%)' }} />
          </div>
          <div style={{ position:'absolute', left:0, bottom:24,
            display:'flex', flexDirection:'column', gap:6, padding:'0 14px',
            opacity: clamp((localTime-0.5)/0.5, 0, 1) * (1-outT) }}>
            <div style={{ fontFamily:FONT_SERIF, fontStyle:'italic',
              fontSize:52, color:C.cream, lineHeight:1 }}>{caption}</div>
            <div style={{ fontFamily:FONT_MONO, fontSize:16,
              color:C.gold, letterSpacing:'0.28em' }}>{code}</div>
          </div>
        </div>
      );
    }

    /* ── Logo crest: slams in like a wax seal ────────────────────────────── */
    function LogoReveal({ cx=W/2, cy=660 }) {
      const { localTime } = useSprite();
      const tIn    = clamp(localTime / 0.55, 0, 1);
      const settle = Easing.easeOutBack(tIn);
      const scale  = 1.5 - 0.5 * settle;
      const bounce = localTime > 0.55 && localTime < 0.95
        ? Math.sin((localTime - 0.55) / 0.4 * Math.PI) * 0.025 : 0;
      const opacity = clamp(localTime / 0.22, 0, 1);
      const rot    = (1 - settle) * -5;
      const float  = localTime > 0.7 ? Math.sin((localTime - 0.7) * 1.0) * 4 : 0;
      const flash  = (localTime > 0.5 && localTime < 1.2)
        ? 1 + 0.45 * Math.sin((localTime - 0.5) / 0.7 * Math.PI) : 1;
      const SIZE = 640;
      return (
        <div style={{ position:'absolute', left:cx-SIZE/2, top:cy-SIZE/2,
          width:SIZE, height:SIZE,
          transform:`translateY(${float}px) scale(${scale+bounce}) rotate(${rot}deg)`,
          transformOrigin:'center', opacity, willChange:'transform' }}>
          <div style={{ position:'absolute', inset:0,
            filter:`drop-shadow(0 14px 34px rgba(0,0,0,0.6)) brightness(${flash})` }}>
            <img src={LOGO_SRC} alt="Coctelería Experimental"
              style={{ width:'100%', height:'100%', objectFit:'contain', display:'block' }} />
          </div>
        </div>
      );
    }

    /* ── Tagline lockup below crest ──────────────────────────────────────── */
    function TagLockup() {
      const { localTime } = useSprite();
      const a  = d => clamp((localTime - d) / 0.6, 0, 1);
      const e  = Easing.easeOutCubic;
      const l1 = e(a(0)), l2 = e(a(0.3));
      return (
        <div style={{ position:'absolute', left:0, right:0, top:1230, textAlign:'center' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center',
            gap:22, opacity:l1, transform:`translateY(${(1-l1)*14}px)` }}>
            <span style={{ width:64, height:1, background:C.gold }} />
            <span style={{ fontFamily:FONT_DECO, fontSize:32,
              color:C.gold, letterSpacing:'0.42em' }}>EST · MMXXIV</span>
            <span style={{ width:64, height:1, background:C.gold }} />
          </div>
          <div style={{ marginTop:30, fontFamily:FONT_SERIF, fontStyle:'italic',
            fontSize:50, color:C.cream, letterSpacing:'0.01em',
            opacity:l2, transform:`translateY(${(1-l2)*10}px)` }}>
            a journey in every glass
          </div>
        </div>
      );
    }

    /* ── Footer line ─────────────────────────────────────────────────────── */
    function Footer() {
      const { localTime } = useSprite();
      const op = clamp(localTime / 0.6, 0, 1);
      return (
        <div style={{ position:'absolute', left:0, right:0, bottom:150, textAlign:'center',
          opacity:op, transform:`translateY(${(1-op)*16}px)` }}>
          <div style={{ fontFamily:FONT_MONO, fontSize:20,
            color:'rgba(224,181,61,0.85)', letterSpacing:'0.4em',
            textTransform:'uppercase' }}>
            COCKTAILS · SPIRITS · EXPERIMENTS
          </div>
        </div>
      );
    }

    /* ── Splash stage — no chrome, full-screen, loops ────────────────────── */
    function SplashStage({ children, loop=true, onDismiss }) {
      const [time, setTime]   = useState(0);
      const [scale, setScale] = useState(1);
      const containerRef = useRef(null);
      const rafRef       = useRef(null);
      const lastTsRef    = useRef(null);
      const firedRef     = useRef(false);

      // Scale canvas to fit viewport
      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const measure = () => {
          setScale(Math.max(0.01, Math.min(el.clientWidth / W, el.clientHeight / H)));
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(el);
        window.addEventListener('resize', measure);
        return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
      }, []);

      // Playback loop
      useEffect(() => {
        const step = ts => {
          if (lastTsRef.current == null) lastTsRef.current = ts;
          const dt = (ts - lastTsRef.current) / 1000;
          lastTsRef.current = ts;
          setTime(t => {
            const next = t + dt;
            if (next >= DURATION) {
              if (!firedRef.current) {
                firedRef.current = true;
                setTimeout(() => {
                window.dispatchEvent(new CustomEvent('stingComplete'));
                try { window.parent.postMessage('stingComplete', '*'); } catch(_) {}
              }, 0);
              }
              return loop ? next % DURATION : DURATION;
            }
            return next;
          });
          rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          lastTsRef.current = null;
        };
      }, [loop]);

      const ctx = useMemo(
        () => ({ time, duration: DURATION, playing: true, setTime, setPlaying: () => {} }),
        [time]
      );

      return (
        <div ref={containerRef} style={{ position:'fixed', inset:0,
          display:'flex', alignItems:'center', justifyContent:'center',
          background:C.bg }}>
          <div style={{ width:W, height:H, position:'relative',
            transform:`scale(${scale})`, transformOrigin:'center',
            flexShrink:0, overflow:'hidden' }}>
            <TimelineContext.Provider value={ctx}>
              {children}
            </TimelineContext.Provider>
          </div>
          <button id="skip-btn" onClick={onDismiss}>Skip ›</button>
        </div>
      );
    }

    /* ── Root: assembles all sprites ─────────────────────────────────────── */
    function PassportSting({ onDismiss }) {
      const [p1, p2] = useMemo(() => pickTwo(), []);
      return (
        <SplashStage loop onDismiss={onDismiss}>
          <Sprite start={0}   end={14} keepMounted><Background /></Sprite>
          <Sprite start={0.3} end={14} keepMounted><DecoFrame /></Sprite>

          <Sprite start={0.6} end={7.8}>
            <MonoLine text="THE EXPERIMENTAL BAR" x={W/2} y={150} size={24} align="center" color={C.gold} />
            <MonoLine text="MIXOLOGY · CRAFT · RITUAL" x={W/2} y={196} size={16} align="center"
              color="rgba(224,181,61,0.65)" letter="0.42em" delay={0.5} />
          </Sprite>

          <Sprite start={1.8} end={4.9}>
            <PhotoReveal src={driveUrl(p1.id)} caption={p1.title}
              code="SERVICE 01 · SIGNATURE" fromLeft />
          </Sprite>
          <Sprite start={4.7} end={7.9}>
            <PhotoReveal src={driveUrl(p2.id)} caption={p2.title}
              code="SERVICE 02 · THE LIST" fromLeft={false} />
          </Sprite>

          <Sprite start={8.0} end={14}>
            <LogoReveal cx={W/2} cy={660} />
          </Sprite>
          <Sprite start={9.6} end={14}>
            <TagLockup />
          </Sprite>
          <Sprite start={10.6} end={14}>
            <Footer />
          </Sprite>
        </SplashStage>
      );
    }

    /* ── App shell: handles visibility + fade-out ────────────────────────── */
    function App() {
      const [visible, setVisible]  = useState(true);
      const [fading, setFading]    = useState(false);
      const splashRef              = useRef(null);

      const dismiss = () => {
        if (fading || !visible) return;
        setFading(true);
        setTimeout(() => setVisible(false), 700);
      };

      // External API: parent page can call window.dismissSting()
      useEffect(() => {
        window.dismissSting = dismiss;
        return () => { delete window.dismissSting; };
      }, [fading, visible]);

      if (!visible) return null;
      return (
        <div ref={splashRef}
          id="splash-root"
          className={fading ? 'fading' : ''}
          style={{ position:'fixed', inset:0 }}>
          <PassportSting onDismiss={dismiss} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

<!--
  ╔═══════════════════════════════════════════════════════════╗
  ║  INTEGRATION GUIDE                                        ║
  ╠═══════════════════════════════════════════════════════════╣
  ║                                                           ║
  ║  Option A — iframe overlay (simplest)                     ║
  ║  ─────────────────────────────────────────────────────── ║
  ║  <div id="splash" style="position:fixed;inset:0;          ║
  ║    z-index:9999;background:#15100c">                      ║
  ║    <iframe src="/logo-sting.html"                         ║
  ║      style="width:100%;height:100%;border:none"           ║
  ║      id="sting-frame"></iframe>                           ║
  ║  </div>                                                   ║
  ║                                                           ║
  ║  // Dismiss when app is ready:                            ║
  ║  document.getElementById('sting-frame')                   ║
  ║    .contentWindow.dismissSting();                         ║
  ║  // or listen for the event:                              ║
  ║  window.addEventListener('message', e => {                ║
  ║    if (e.data === 'stingComplete') hideSplash();          ║
  ║  });                                                      ║
  ║                                                           ║
  ║  Option B — same-page include                             ║
  ║  ─────────────────────────────────────────────────────── ║
  ║  window.addEventListener('stingComplete', () => {         ║
  ║    // fires once after first full playthrough             ║
  ║  });                                                      ║
  ║  window.dismissSting(); // call at any time               ║
  ║                                                           ║
  ║  PHOTOS: Google Drive folder must stay shared             ║
  ║  "anyone with the link" for images to load.               ║
  ╚═══════════════════════════════════════════════════════════╝
-->
