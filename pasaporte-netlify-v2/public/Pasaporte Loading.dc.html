<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital@1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; height: 100%; background: #15100c; overflow: hidden; }
    @keyframes pc-spin { to { transform: rotate(360deg); } }
    @keyframes pc-flashin {
      0%   { opacity: 0; transform: scale(0.62) translateY(10px); filter: brightness(2.2); }
      55%  { filter: brightness(1.6); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1); }
    }
    @keyframes pc-breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.028); }
    }
    @keyframes pc-sweep {
      0%   { transform: translateX(-115%); }
      100% { transform: translateX(372%); }
    }
    @keyframes pc-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pc-dots { 0%,20%{opacity:.25} 50%{opacity:1} 80%,100%{opacity:.25} }
  </style>
</helmet>
<div data-screen-label="loading" style="position:absolute; inset:0; background:#15100c; overflow:hidden; font-family:'Cinzel', serif;">

  <!-- ambient brand backdrop -->
  <div style="position:absolute; inset:0; background:radial-gradient(120% 90% at 50% 44%, rgba(140,42,34,0.30) 0%, rgba(21,16,12,0) 58%);"></div>
  <div style="position:absolute; left:50%; top:46%; width:160vmax; height:160vmax; margin-left:-80vmax; margin-top:-80vmax; background:repeating-radial-gradient(circle, rgba(224,181,61,0.045) 0 1px, rgba(224,181,61,0) 1px 15px); animation:pc-spin 90s linear infinite;"></div>
  <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 24%, rgba(0,0,0,0.34) 100%);"></div>

  <!-- faint deco frame -->
  <div style="position:absolute; inset:clamp(20px,4.5vmin,46px); border:1px solid rgba(224,181,61,0.18);"></div>

  <!-- centered loading column -->
  <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(22px,4vmin,40px); padding:6vmin; box-sizing:border-box;">

    <div>
      <img src="uploads/logo-crest.png" alt="Coctelería Experimental" style="display:block; width:clamp(150px,34vmin,280px); height:auto; filter:drop-shadow(0 14px 30px rgba(0,0,0,0.55)); animation:pc-breathe 3.4s ease-in-out infinite;" />
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:clamp(16px,2.6vmin,26px);">
      <div style="display:flex; align-items:center; gap:18px; animation:none;">
        <span style="width:clamp(28px,6vmin,52px); height:1px; background:#e0b53d;"></span>
        <span style="font-family:'Cinzel', serif; font-size:clamp(13px,2.4vmin,18px); color:#e0b53d; letter-spacing:0.4em;">COCKTAILS · SPIRITS</span>
        <span style="width:clamp(28px,6vmin,52px); height:1px; background:#e0b53d;"></span>
      </div>

      <!-- indeterminate loader -->
      <div style="position:relative; width:clamp(170px,42vmin,260px); height:2px; background:rgba(224,181,61,0.18); overflow:hidden;">
        <div style="position:absolute; top:0; left:0; height:100%; width:34%; background:linear-gradient(90deg, rgba(224,181,61,0) 0%, #e0b53d 45%, #f4dd97 60%, rgba(224,181,61,0) 100%); animation:pc-sweep 1.5s ease-in-out infinite;"></div>
      </div>

      <div style="display:flex; align-items:center; gap:3px; font-family:'JetBrains Mono', ui-monospace, monospace; font-size:clamp(11px,1.9vmin,14px); color:rgba(224,181,61,0.7); letter-spacing:0.34em; text-transform:uppercase;">
        <span>Preparing your table</span><span style="animation:pc-dots 1.4s infinite;">.</span><span style="animation:pc-dots 1.4s infinite .2s;">.</span><span style="animation:pc-dots 1.4s infinite .4s;">.</span>
      </div>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
